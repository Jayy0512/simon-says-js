<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simono Says</title>
    <link rel="stylesheet" href="simon.css">
</head>
<body>
    <h1>Simon Game</h1>
    <h2>Press any key to start the game</h2>

    <div class="button-container">
        <div class="line-one">
            <div class="button red" type="button"></div>
            <div class="button blue" type="button"></div>
        </div>
        <div class="line-two">
            <div class="button green" type="button"></div>
            <div class="button yellow" type="button"></div>
        </div>
    </div>

    <script src="simon.js"></script>
</body>
</html>
